<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitung Zikir - Ramadhan Kareem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Decorative Background -->
    <div class="bg-pattern"></div>

    <!-- Header with Navigation -->
    <header class="main-header">
        <nav class="navbar">
            <div class="navbar-container">
                <a href="../index.html" class="navbar-brand">
                    <div class="brand-icon">
                        <i class="fas fa-mosque"></i>
                    </div>
                    <span class="brand-text">Ramadhan Portal</span>
                </a>
                
                <!-- Mobile Menu Toggle -->
                <button class="navbar-toggle" id="navbarToggle" aria-label="Toggle Menu">
                    <i class="fas fa-bars"></i>
                </button>

                <!-- Navigation Menu -->
                <ul class="navbar-menu" id="navbarMenu">
                    <li><a href="../index.html" class="nav-link">
                        <i class="fas fa-home"></i> <span>Home</span>
                    </a></li>
                    <li><a href="../misi5/index.html" class="nav-link">
                        <i class="fas fa-clock"></i> <span>Jadwal Imsakiyah</span>
                    </a></li>
                    <li><a href="../misi1/doa-harian.html" class="nav-link">
                        <i class="fas fa-book-quran"></i> <span>Doa Harian</span>
                    </a></li>
                    <li><a href="../misi1/index.html" class="nav-link">
                        <i class="fas fa-moon"></i> <span>Doa Sahur & Buka</span>
                    </a></li>
                    <li><a href="../misi1/dzikir.html" class="nav-link">
                        <i class="fas fa-pray"></i> <span>Dzikir</span>
                    </a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="page-icon gold">
                <i class="fas fa-calculator"></i>
            </div>
            <h1>Hitung Zikir</h1>
            <p>Semangat menebar kebaikan di bulan suci</p>
        </div>

        <!-- Counter Container -->
        <div class="counter-container">
            <section class="target-info">
                <span>Target: <span id="target-value">33</span>
            </section>

            <section class="counter-display">
                <span id="counter-number">0</span>
            </section>

            <section class="controls">
                <button id="add-btn" class="btn btn-primary" aria-label="Tambah Hitungan">
                    <i class="fas fa-plus"></i>
                </button>
                <button id="reset-btn" class="btn btn-secondary" aria-label="Reset Hitungan">
                    <i class="fas fa-redo"></i> Reset
                </button>
            </section>

            <div id="notification-area" class="notification hidden">
                <p><i class="fas fa-check-circle"></i> Target tercapai! ✨</p>
            </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="brand-icon small">
                    <i class="fas fa-mosque"></i>
                </div>
                <span>Ramadhan Portal</span>
            </div>
            <p class="footer-tagline">Semangat Beribadah di Bulan Suci</p>
            <p class="footer-copyright">
                &copy; 2026 Project Page Ramadhan | Created with <i class="fas fa-heart"></i> by Ayu Anggaraini
            </p>
        </div>
    </footer>

    <!-- Mobile Menu Script -->
    <script>
        document.getElementById('navbarToggle').addEventListener('click', function() {
            document.getElementById('navbarMenu').classList.toggle('active');
            this.querySelector('i').classList.toggle('fa-bars');
            this.querySelector('i').classList.toggle('fa-times');
        });

    <script src="script.js"></script>
