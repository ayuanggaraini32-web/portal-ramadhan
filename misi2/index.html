<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitung Zikir - Ramadhan Multi-Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <a href="../index.html" class="back-portal">
            <i class="fas fa-arrow-left"></i> Kembali ke Portal
        </a>
        <h1>Hitung Zikir</h1>
        <p>Semangat menebar kebaikan di bulan suci</p>
    </header>

    <main>
        <div class="counter-container">
            <section class="target-info">
                <span>Target: <span id="target-value">33</span></span>
            </section>

            <section class="counter-display">
                <span id="counter-number">0</span>
            </section>

            <section class="controls">
                <button id="add-btn" class="btn btn-primary" aria-label="Tambah Hitungan">+</button>
                <button id="reset-btn" class="btn btn-secondary" aria-label="Reset Hitungan">Reset</button>
            </section>

            <div id="notification-area" class="notification hidden">
                <p>Target tercapai! ✨</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Ramadhan Multi-Page. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
