<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Zakat | Ramadhan Kareem</title>
<link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind kept for misi3 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#1B3B18',
                        'secondary': '#D4AF37',
                        'secondary-dark': '#B8860B',
                        'glass': 'rgba(255,255,255,0.08)',
                    }
                }
            }
        }
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gold-primary': '#D4AF37',
                        'gold-dark': '#B8860B',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="min-h-screen flex flex-col bg-gray-50">

    <!-- Simple Top Bar -->
    <header class="bg-white border-b-4 border-gold-primary py-4 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="../index.html" class="flex items-center space-x-2 text-emerald-800 hover:text-emerald-600">
                    <i class="fas fa-arrow-left"></i>
                    <span class="font-semibold">Kembali</span>
                </a>
            </div>
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 gold-gradient rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-mosque text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold text-emerald-900 tracking-tight">
                        RAMADHAN <span class="text-amber-600">PORTAL</span>
                    </h1>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-grow container mx-auto px-4 py-10 max-w-5xl">
        <div class="grid lg:grid-cols-5 gap-8 items-start">

            <!-- FORM SECTION -->
            <section class="lg:col-span-3 bg-white p-8 rounded-2xl shadow-lg relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-600 to-emerald-800"></div>
                <h2 class="text-2xl font-bold text-emerald-900 mb-8">
                    <i class="fas fa-sliders-h mr-2 text-gold-primary"></i>Parameter Zakat
                </h2>

                <div class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-emerald-800 mb-2 uppercase tracking-wide">
                                Pilih Jenis Zakat
                            </label>
                            <select id="zakatType" class="w-full px-4 py-3 rounded-xl border-2 border-emerald-200 focus:border-emerald-500 focus:outline-none bg-white">
                                <option value="penghasilan">Zakat Penghasilan</option>
                                <option value="emas">Zakat Emas</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-emerald-800 mb-2 uppercase tracking-wide">
                                Harga Emas Hari Ini
                            </label>
                            <div class="relative">
                                <span class="absolute left-3 top-3 text-gold-dark font-bold">Rp</span>
                                <input type="number" id="goldPrice" class="w-full px-4 py-3 pl-12 rounded-xl border-2 border-emerald-200 focus:border-emerald-500 focus:outline-none" placeholder="Contoh: 1,200,000">
                            </div>
                        </div>
                    </div>

                    <hr class="border-gold-primary opacity-20">

                    <!-- FORM PENGHASILAN -->
                    <div id="formPenghasilan" class="space-y-5">
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-emerald-800 mb-2">Gaji Bulanan</label>
                                <input type="number" id="income" class="w-full px-4 py-3 rounded-xl border-2 border-emerald-200 focus:border-emerald-500 focus:outline-none" placeholder="0">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-emerald-800 mb-2">Bonus / Lain-lain</label>
                                <input type="number" id="otherIncome" class="w-full px-4 py-3 rounded-xl border-2 border-emerald-200 focus:border-emerald-500 focus:outline-none" placeholder="0">
                            </div>
                        </div>
                    </div>

                    <!-- FORM EMAS -->
                    <div id="formEmas" class="hidden space-y-5">
                        <div>
                            <label class="block text-sm font-bold text-emerald-800 mb-2">Berat Emas yang Dimiliki</label>
                            <div class="relative">
                                <input type="number" id="goldWeight" class="w-full px-4 py-3 pr-16 rounded-xl border-2 border-emerald-200 focus:border-emerald-500 focus:outline-none" placeholder="0">
                                <span class="absolute right-4 top-3 text-gold-dark font-bold">gram</span>
                            </div>
                        </div>
                    </div>

                    <!-- BUTTON -->
                    <button id="btnCalculate" class="w-full py-4 bg-gradient-to-r from-emerald-600 to-emerald-800 text-white font-bold rounded-xl hover:from-emerald-700 hover:to-emerald-900 transition-all shadow-lg">
                        <i class="fas fa-calculator mr-2"></i>Hitung Zakat Sekarang
                    </button>
                </div>
            </section>

            <!-- RESULT SECTION -->
            <section id="resultBox" class="lg:col-span-2">
                <div class="bg-white p-8 rounded-2xl shadow-lg border-t-8 border-gold-primary">

                    <h3 class="text-xl font-extrabold text-emerald-900 text-center">
                        <i class="fas fa-clipboard-check mr-2 text-gold-primary"></i>Rincian Kewajiban
                    </h3>

                    <div class="space-y-4 mt-6">
                        <div class="bg-gray-50 p-4 rounded-xl border-l-4 border-emerald-800">
                            <p class="text-xs text-emerald-800 font-bold uppercase mb-1">Total Harta Terhitung</p>
                            <p id="resTotal" class="text-lg font-bold text-gray-900">Rp 0</p>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-xl border-l-4 border-gold-primary">
                            <p class="text-xs text-gold-dark font-bold uppercase mb-1">Ambang Batas (Nisab)</p>
                            <p id="resNisab" class="text-lg font-bold text-gray-900">Rp 0</p>
                        </div>

                        <div class="flex items-center justify-between py-2">
                            <span class="text-sm font-bold text-emerald-900 uppercase">Status</span>
                            <span id="resStatus" class="px-3 py-1 rounded-full text-xs font-black tracking-widest bg-emerald-100 text-emerald-800">WAJIB</span>
                        </div>

                        <div class="mt-8 p-6 bg-gradient-to-r from-emerald-600 to-emerald-800 rounded-2xl text-center">
                            <p class="text-xs text-white opacity-80 uppercase">Zakat yang ditunaikan</p>
                            <p id="resZakat" class="text-3xl font-black text-white">Rp 0</p>
                        </div>

                        <div id="notObligatedNote" class="hidden text-sm text-center text-amber-700 bg-amber-50 p-4 rounded-xl border border-amber-200">
                            <p><i class="fas fa-info-circle mr-1"></i>Harta belum mencapai nisab.</p>
                        </div>
                    </div>

                </div>
            </section>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-emerald-950 text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-sm opacity-60 uppercase tracking-widest">
                &copy; 2026 Zakat Digital Indonesia | Project Page Ramadhan
            </p>
        </div>
    </footer>

    <!-- SCRIPT EKSTERNAL -->
    <script src="script.js"></script>
</body>

</html>
